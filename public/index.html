<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="settings-heading">
        <header class="card__header">
          <h1 id="settings-heading">Settings</h1>
          <p class="card__subtitle">Update your account details below.</p>
        </header>

        <form id="settings-form" class="settings-form" novalidate>
          <div class="form-group">
            <label for="name">Name <span class="required" aria-hidden="true">*</span></label>
            <input
              type="text"
              id="name"
              name="name"
              autocomplete="name"
              required
              aria-required="true"
              aria-describedby="name-error"
            />
            <p id="name-error" class="error-message" role="alert" hidden></p>
          </div>

          <div class="form-group">
            <label for="email">Email <span class="required" aria-hidden="true">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              required
              aria-required="true"
              aria-describedby="email-error"
            />
            <p id="email-error" class="error-message" role="alert" hidden></p>
          </div>

          <div class="form-group">
            <label for="password">Password <span class="required" aria-hidden="true">*</span></label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="new-password"
              minlength="8"
              required
              aria-required="true"
              aria-describedby="password-error password-hint"
            />
            <p id="password-hint" class="hint">Must be at least 8 characters.</p>
            <p id="password-error" class="error-message" role="alert" hidden></p>
          </div>

          <p id="form-success" class="success-message" role="status" hidden></p>

          <button type="submit" class="btn btn--primary">Save Settings</button>
        </form>
      </section>
    </main>

    <script src="/settings.js"></script>
  </body>
</html>
